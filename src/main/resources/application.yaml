spring:
  config:
    import:
      - optional:file:.env[.properties]

  application:
    name: ${APP_NAME}

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

jwt:
  secret: ${SECRET_KEY}
  access-token-expiration-ms: 3600000
  refresh-token-expiration-ms: 25200000

jpa:
  hibernate:
    ddl-auto: update
  show-sql: true