    import:
      - optional:file:.env[.properties]

  application:
    name: bookapp

  datasource:
    url: jdbc:postgresql://${DB_HOST:aws-1-ap-northeast-2.pooler.supabase.com}:5432/postgres?sslmode=require&sslfactory=org.postgresql.ssl.NonValidatingFactory
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:aivle202609!@#}
